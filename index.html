<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>💰 나의 가계부</title>
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#7c6af7"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="가계부"/>
  <link rel="apple-touch-icon" href="./icon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:#0f0f1a; --bg2:#16162a; --bg3:#1e1e35; --surface:#22223d;
      --border:#2e2e50; --accent:#7c6af7; --accent2:#a78bfa;
      --green:#34d399; --red:#f87171; --yellow:#fbbf24; --blue:#60a5fa;
      --text:#e8e8f8; --text2:#9898c0; --text3:#5c5c8a;
      --radius:16px; --radius-sm:10px;
      --font:'Noto Sans KR',sans-serif; --mono:'Space Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overscroll-behavior:none}

    .header{position:sticky;top:0;z-index:200;background:rgba(15,15,26,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px 10px}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .app-title{font-size:1.15rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .month-nav{display:flex;align-items:center;gap:10px}
    .month-nav button{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .month-nav button:hover{background:var(--surface);color:var(--accent);border-color:var(--accent)}
    .month-label{font-family:var(--mono);font-size:.92rem;color:var(--text);font-weight:700;min-width:72px;text-align:center}
    .tabs{display:flex;gap:4px;overflow-x:auto;padding:0 2px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:none;background:transparent;color:var(--text3);font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
    .tab.active{background:var(--accent);color:white}
    .tab:not(.active):hover{color:var(--text2);background:var(--bg3)}

    .content{max-width:580px;margin:0 auto;padding:18px 16px 100px}

    /* SUMMARY */
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
    .summary-grid-4{grid-template-columns:repeat(4,1fr)}
    .summary-grid-5{grid-template-columns:repeat(5,1fr)}
    @media(max-width:500px){.summary-grid-4,.summary-grid-5{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:340px){.summary-grid-4,.summary-grid-5{grid-template-columns:repeat(2,1fr)}}
    .scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;position:relative;overflow:hidden}
    .scard::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
    .scard.inc::before{background:var(--green)}
    .scard.exp::before{background:var(--red)}
    .scard.bal::before{background:var(--accent)}
    .scard.sav::before{background:#818cf8}
    .scard.inv::before{background:var(--blue)}
    .scard .slabel{font-size:.68rem;color:var(--text3);font-weight:600;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
    .scard .sval{font-family:var(--mono);font-size:.95rem;font-weight:700}
    .scard.inc .sval{color:var(--green)}
    .scard.exp .sval{color:var(--red)}
    .scard.bal .sval{color:var(--accent2)}
    .scard.sav .sval{color:#818cf8}
    .scard.inv .sval{color:var(--blue)}

    /* ASSET BANNER */
    .asset-banner{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(124,106,247,.1));border:1px solid rgba(96,165,250,.22);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .ab-label{font-size:.68rem;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
    .ab-val{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--blue)}
    .ab-sub{font-size:.72rem;color:var(--text3);margin-top:3px}
    .asset-btn{padding:8px 14px;background:rgba(96,165,250,.18);border:1px solid rgba(96,165,250,.35);border-radius:8px;color:var(--blue);font-size:.76rem;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .2s;flex-shrink:0}
    .asset-btn:hover{background:rgba(96,165,250,.3)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
    .modal-overlay.hidden{display:none}
    .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:580px}
    .modal-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
    .modal-sub{font-size:.78rem;color:var(--text3);margin-bottom:20px;line-height:1.55}
    .modal-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-size:1.1rem;font-family:var(--mono);font-weight:700;outline:none;text-align:right;transition:border-color .2s}
    .modal-input:focus{border-color:var(--blue)}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .modal-cancel{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text2);font-size:.88rem;font-weight:700;cursor:pointer;font-family:var(--font)}
    .modal-save{padding:12px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--blue),var(--accent));color:white;font-size:.88rem;font-weight:700;cursor:pointer;font-family:var(--font)}

    /* CARD */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
    .card-title{font-size:.82rem;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-title span{color:var(--text3);font-weight:400;font-size:.75rem;text-transform:none}

    /* TX */
    .tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .tx-item:last-child{border-bottom:none}
    .tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .tx-body{flex:1;min-width:0}
    .tx-name{font-size:.86rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:.71rem;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .tx-badge{font-size:.62rem;background:rgba(124,106,247,.2);color:var(--accent2);padding:1px 5px;border-radius:4px;font-weight:700}
    .tx-amt{font-family:var(--mono);font-size:.88rem;font-weight:700;flex-shrink:0}
    .tx-amt.inc{color:var(--green)}
    .tx-amt.exp{color:var(--red)}
    .tx-amt.sav{color:#818cf8}
    .tx-amt.inv{color:var(--blue)}
    .tx-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;font-size:.8rem;transition:all .2s;flex-shrink:0}
    .tx-del:hover{color:var(--red);background:rgba(248,113,113,.1)}

    /* FORM */
    .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .type-btn{padding:11px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg3);color:var(--text3);font-size:.88rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s}
    .type-btn.inc.on{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}
    .type-btn.exp.on{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
    .type-btn.sav.on{border-color:#818cf8;background:rgba(129,140,248,.1);color:#818cf8}
    .type-btn.inv.on{border-color:var(--blue);background:rgba(96,165,250,.1);color:var(--blue)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fg{margin-bottom:12px}
    .flabel{font-size:.72rem;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
    .finput,.fselect{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-size:.88rem;font-family:var(--font);outline:none;transition:border-color .2s}
    .finput:focus,.fselect:focus{border-color:var(--accent)}
    .finput::placeholder{color:var(--text3)}
    .fselect option{background:var(--bg3)}
    .submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#9b8af8);color:white;border:none;border-radius:var(--radius-sm);font-size:.92rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .2s;margin-top:4px}
    .submit-btn:hover{opacity:.88}
    .submit-btn:active{transform:scale(.98)}

    /* RECURRING */
    .rec-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
    .rec-item:last-child{border-bottom:none}
    .rec-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
    .rec-body{flex:1;min-width:0}
    .rec-name{font-size:.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rec-meta{font-size:.71rem;color:var(--text3);margin-top:2px}
    .rec-amt{font-family:var(--mono);font-size:.84rem;font-weight:700;flex-shrink:0}
    .rec-amt.inc{color:var(--green)}
    .rec-amt.exp{color:var(--red)}
    .rec-amt.sav{color:#818cf8}
    .rec-amt.inv{color:var(--blue)}
    .rec-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;font-size:.8rem;transition:all .2s;flex-shrink:0}
    .rec-del:hover{color:var(--red);background:rgba(248,113,113,.1)}
    .rec-toggle{position:relative;width:36px;height:20px;flex-shrink:0}
    .rec-toggle input{opacity:0;width:0;height:0;position:absolute}
    .rec-slider{position:absolute;inset:0;border-radius:10px;background:var(--border);cursor:pointer;transition:.2s}
    .rec-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;border-radius:50%;background:var(--text3);transition:.2s}
    .rec-toggle input:checked+.rec-slider{background:var(--accent)}
    .rec-toggle input:checked+.rec-slider::before{transform:translateX(16px);background:white}

    .apply-btn{width:100%;padding:11px;background:rgba(124,106,247,.13);border:1px solid rgba(124,106,247,.3);border-radius:var(--radius-sm);color:var(--accent2);font-size:.84rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s;margin-top:10px}
    .apply-btn:hover:not(:disabled){background:rgba(124,106,247,.22)}
    .apply-btn:disabled{opacity:.45;cursor:not-allowed}

    /* MISC */
    .chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:.76rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
    .chip.on{background:var(--accent);color:white;border-color:var(--accent)}
    .bitem{margin-bottom:16px}
    .bheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .bname{font-size:.84rem;font-weight:600;color:var(--text)}
    .bamts{font-size:.74rem;color:var(--text3);font-family:var(--mono)}
    .pbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:8px}
    .pfill{height:100%;border-radius:3px;transition:width .4s}
    .pfill.ok{background:linear-gradient(90deg,var(--green),#6ee7b7)}
    .pfill.warn{background:linear-gradient(90deg,var(--yellow),#fcd34d)}
    .pfill.over{background:linear-gradient(90deg,var(--red),#fca5a5)}
    .binput-row{display:flex;gap:8px}
    .binput-row input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:.82rem;outline:none;font-family:var(--mono)}
    .binput-row input:focus{border-color:var(--accent)}
    .bsave{padding:8px 14px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:var(--font)}
    .chart-wrap{position:relative;height:220px}
    .srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .srow:last-child{border-bottom:none}
    .slbl{font-size:.82rem;color:var(--text2)}
    .sval2{font-size:.86rem;font-weight:700;font-family:var(--mono)}
    .cstat{display:flex;align-items:center;gap:10px;padding:7px 0}
    .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cname{font-size:.80rem;color:var(--text2);flex:1}
    .cbar{flex:2;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
    .cbar-fill{height:100%;border-radius:3px}
    .cpct{font-size:.72rem;color:var(--text3);min-width:32px;text-align:right}
    .camt{font-size:.74rem;font-weight:700;color:var(--text2);min-width:60px;text-align:right;font-family:var(--mono)}
    .empty{text-align:center;padding:32px 16px;color:var(--text3)}
    .empty .ei{font-size:2.4rem;margin-bottom:10px}
    .empty p{font-size:.82rem;line-height:1.6}
    .alert-over{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px}
    .alert-over .ah{font-size:.78rem;font-weight:700;color:var(--red);margin-bottom:4px}
    .alert-over .am{font-size:.74rem;color:rgba(248,113,113,.8)}
    .toast{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:var(--green);font-weight:600;text-align:center}
    .info-box{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.18);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:.78rem;color:var(--blue);line-height:1.55}
    .export-row{display:flex;gap:8px;margin-bottom:14px}
    .export-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s}
    .export-btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
    #install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px;max-width:580px;margin:0 auto}
    #install-banner.show{display:flex;align-items:center;gap:12px}
    .ib-text{flex:1}
    .ib-text strong{font-size:.88rem;color:var(--text);display:block;margin-bottom:2px}
    .ib-text span{font-size:.74rem;color:var(--text3)}
    .ib-install{padding:9px 18px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:var(--font)}
    .ib-dismiss{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;padding:4px}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    @media(max-width:380px){.frow{grid-template-columns:1fr}.scard .sval{font-size:.80rem}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">💰 나의 가계부</div>
    <div class="month-nav">
      <button id="prev-btn">‹</button>
      <span class="month-label" id="month-label"></span>
      <button id="next-btn">›</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">🏠 홈</button>
    <button class="tab" data-tab="add">➕ 입력</button>
    <button class="tab" data-tab="list">📋 내역</button>
    <button class="tab" data-tab="recurring">🔁 자동화</button>
    <button class="tab" data-tab="budget">🎯 예산</button>
    <button class="tab" data-tab="chart">📊 차트</button>
    <button class="tab" data-tab="report">📈 리포트</button>
  </div>
</div>

<div class="content" id="content"></div>

<!-- 자산 입력 모달 -->
<div class="modal-overlay hidden" id="asset-modal">
  <div class="modal-box">
    <div class="modal-title">📦 총 자산 기록</div>
    <div class="modal-sub" id="asset-modal-sub"></div>
    <input type="text" inputmode="numeric" class="modal-input" id="asset-input" placeholder="0"/>
    <div class="modal-btns">
      <button class="modal-cancel" id="asset-cancel">취소</button>
      <button class="modal-save" id="asset-save">저장</button>
    </div>
  </div>
</div>

<div id="install-banner">
  <div class="ib-text">
    <strong>📱 앱으로 설치하기</strong>
    <span>홈 화면에 추가하면 앱처럼 사용할 수 있어요</span>
  </div>
  <button class="ib-install" id="ib-install-btn">설치</button>
  <button class="ib-dismiss" id="ib-dismiss-btn">✕</button>
</div>

<script>
// ══ CATEGORIES ══════════════════════════════════════════════
// type='expense' : 소비성 지출
const EXP_CATS = [
  {id:'food',      label:'🍚 식비',     color:'#f87171'},
  {id:'transport', label:'🚌 교통',     color:'#fb923c'},
  {id:'shopping',  label:'🛍 쇼핑',    color:'#a78bfa'},
  {id:'health',    label:'💊 의료/건강', color:'#34d399'},
  {id:'culture',   label:'🎬 문화/여가', color:'#60a5fa'},
  {id:'edu',       label:'📚 교육',     color:'#f472b6'},
  {id:'house',     label:'🏠 주거/관리', color:'#fbbf24'},
  {id:'etc',       label:'💸 기타',     color:'#94a3b8'},
];
// type='saving' : 저축 (원금 보장 - 적금·예금 등)
const SAV_CATS = [
  {id:'sv_deposit', label:'🏦 적금',       color:'#818cf8'},
  {id:'sv_savings', label:'💳 예금',        color:'#6366f1'},
  {id:'sv_pension', label:'🏛 연금/청약',   color:'#8b5cf6'},
  {id:'sv_etc',     label:'🪙 기타저축',    color:'#7c3aed'},
];
// type='invest' : 투자 (평가액 기준 - 주식·펀드 등)
const INV_CATS = [
  {id:'iv_stock',   label:'📈 주식/ETF',   color:'#06b6d4'},
  {id:'iv_fund',    label:'💎 펀드/채권',  color:'#0ea5e9'},
  {id:'iv_crypto',  label:'🪙 가상자산',   color:'#38bdf8'},
  {id:'iv_etc',     label:'📊 기타투자',   color:'#0284c7'},
];
// type='income' : 수입
const INC_CATS = [
  {id:'salary',  label:'💼 급여',      color:'#34d399'},
  {id:'sidejob', label:'💡 부업',      color:'#10b981'},
  {id:'invest',  label:'📈 투자수익',  color:'#06b6d4'},
  {id:'gift',    label:'🎁 용돈/선물', color:'#8b5cf6'},
  {id:'etc_in',  label:'💰 기타수입',  color:'#64748b'},
];
const ALL_CATS = [...EXP_CATS,...SAV_CATS,...INV_CATS,...INC_CATS];

// ══ UTILS ═══════════════════════════════════════════════════
const fmt      = n => n.toLocaleString('ko-KR')+'원';
const fmtShort = n => { if(Math.abs(n)>=100000000) return (n/100000000).toFixed(1)+'억'; if(Math.abs(n)>=10000) return (n/10000).toFixed(0)+'만'; return n.toLocaleString('ko-KR'); };
const mkKey    = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtNum   = v => { const n=v.replace(/[^0-9]/g,''); return n?parseInt(n).toLocaleString('ko-KR'):''; };

// ══ STATE ════════════════════════════════════════════════════
const _now = new Date();
let curYear  = _now.getFullYear();
let curMonth = _now.getMonth();
let curTab   = 'dashboard';
let listFilter = 'all';

function ld(key,def){ try{ return JSON.parse(localStorage.getItem(key))??def; }catch{return def;} }
function sv(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} }

// 거래 내역
let transactions  = ld('kh_tx', []);
// 예산
let budgets       = ld('kh_budgets', {});
// 정기 항목: {id, name, type, amount, category, day(1~28|'last'), enabled}
let recurrings    = ld('kh_recurring', []);
// 자산 스냅샷: {"2026-03": {amount, date}}
let assetSnaps    = ld('kh_assets', {});
// 자동 적용 이력: {"2026-03": true}
let appliedMonths = ld('kh_applied', {});

const saveTx  = () => sv('kh_tx', transactions);
const saveBg  = () => sv('kh_budgets', budgets);
const saveRec = () => sv('kh_recurring', recurrings);
const saveAss = () => sv('kh_assets', assetSnaps);
const saveApp = () => sv('kh_applied', appliedMonths);

// ══ DERIVED ══════════════════════════════════════════════════
const getMonthTx  = () => transactions.filter(t=>t.date.startsWith(mkKey(curYear,curMonth))).sort((a,b)=>b.date.localeCompare(a.date));
const getMonthBg  = () => budgets[mkKey(curYear,curMonth)]||{};
const totals = txs => {
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const sav=txs.filter(t=>t.type==='saving').reduce((s,t)=>s+t.amount,0);
  const inv=txs.filter(t=>t.type==='invest').reduce((s,t)=>s+t.amount,0);
  return {inc, exp, sav, inv, bal: inc-exp-sav-inv};
};

// ══ AUTO-APPLY RECURRING ════════════════════════════════════
// 해당 월로 이동할 때 활성화된 정기 항목을 자동으로 거래 내역에 삽입
function autoApplyRecurring(y, m) {
  const mk = mkKey(y,m);
  if (appliedMonths[mk]) return 0;

  const active = recurrings.filter(r=>r.enabled);
  if (!active.length) { appliedMonths[mk]=true; saveApp(); return 0; }

  let cnt = 0;
  active.forEach(r => {
    // 중복 방지
    if (transactions.find(t=>t.recurringId===r.id&&t.date.startsWith(mk))) return;
    // 날짜 계산
    const maxDay = new Date(y,m+1,0).getDate();
    const day    = r.day==='last' ? maxDay : Math.min(r.day, maxDay);
    const date   = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    transactions.push({
      id: `auto_${r.id}_${mk}_${Date.now()}_${Math.random().toString(36).slice(2)}`,
      recurringId: r.id,
      type: r.type, date, amount: r.amount, category: r.category,
      memo: r.name, auto: true,
    });
    cnt++;
  });

  appliedMonths[mk] = true;
  if (cnt > 0) saveTx();
  saveApp();
  return cnt;
}

// ══ ASSET-BASED BALANCE ══════════════════════════════════════
// 전월 자산 스냅샷 가져오기
function getPrevSnap(y, m) {
  let pm=m-1, py=y;
  if(pm<0){pm=11;py--;}
  return assetSnaps[mkKey(py,pm)] || null;
}

// 추정 순자산: 전월자산 + 수입 - 순소비 (저축·투자는 자산으로 남으므로 차감X)
function getNetAsset(y, m) {
  const txs = transactions.filter(t=>t.date.startsWith(mkKey(y,m)));
  const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const prev = getPrevSnap(y, m);
  return prev ? prev.amount + inc - exp : inc - exp;
}

// ══ RENDER ═══════════════════════════════════════════════════
function render() {
  document.getElementById('month-label').textContent =
    `${curYear}.${String(curMonth+1).padStart(2,'0')}`;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab===curTab));

  const monthTx  = getMonthTx();
  const mb       = getMonthBg();
  const {inc,exp,sav,inv,bal} = totals(monthTx);
  const netAsset = getNetAsset(curYear, curMonth);

  const pages = {
    dashboard: () => renderDashboard(monthTx,inc,exp,sav,inv,bal,netAsset,mb),
    add:       () => renderAdd(),
    list:      () => renderList(monthTx),
    recurring: () => renderRecurring(),
    budget:    () => renderBudget(monthTx,mb),
    chart:     () => renderChart(),
    report:    () => renderReport(monthTx,inc,exp,sav,inv,bal,netAsset,mb),
  };
  document.getElementById('content').innerHTML = pages[curTab]?.() || '';
  afterRender();
}

function afterRender() {
  if(curTab==='add')       bindAddForm();
  if(curTab==='list')      bindList();
  if(curTab==='recurring') bindRecurring();
  if(curTab==='budget')    bindBudget();
  if(curTab==='chart')     buildCharts();
  if(curTab==='report')    bindExport();
  bindAssetModal();
  document.querySelectorAll('.tx-del').forEach(b => {
    b.addEventListener('click', () => {
      transactions = transactions.filter(t=>t.id!==b.dataset.id);
      saveTx(); render();
    });
  });
}

// ══ ASSET BANNER & MODAL ════════════════════════════════════
function assetBannerHTML(netAsset) {
  const mk      = mkKey(curYear,curMonth);
  const curSnap = assetSnaps[mk];
  const prevSnp = getPrevSnap(curYear, curMonth);
  const dispVal = curSnap ? curSnap.amount : netAsset;
  const sub     = prevSnp
    ? `전월 자산 ${fmt(prevSnp.amount)} 기준으로 이번 달 수지를 반영한 추정값`
    : '홈에서 전월 자산을 기록하면 더 정확한 잔액을 볼 수 있어요';
  const entered = curSnap ? ` · ${curSnap.date} 직접 입력` : '';
  return `
  <div class="asset-banner">
    <div>
      <div class="ab-label">총 자산 ${curSnap?'(확인됨)':'(추정)'}</div>
      <div class="ab-val">${fmt(dispVal)}</div>
      <div class="ab-sub">${sub}${entered}</div>
    </div>
    <button class="asset-btn" id="open-asset-modal">${curSnap?'✏️ 수정':'📝 자산 입력'}</button>
  </div>`;
}

function bindAssetModal() {
  document.getElementById('open-asset-modal')?.addEventListener('click', () => {
    const mk = mkKey(curYear,curMonth);
    const ex = assetSnaps[mk];
    document.getElementById('asset-modal-sub').innerHTML =
      `<b>${curYear}년 ${curMonth+1}월</b> 말 기준 <b>총 자산</b>을 입력하세요.<br>
      <span style="color:var(--text3)">예금 + 적금 + 투자계좌 + 현금 등 보유 자산 전체 합계.<br>다음 달 잔액 계산의 기준이 됩니다.</span>`;
    document.getElementById('asset-input').value = ex ? ex.amount.toLocaleString('ko-KR') : '';
    document.getElementById('asset-modal').classList.remove('hidden');
    setTimeout(()=>document.getElementById('asset-input').focus(), 80);
  });
  document.getElementById('asset-cancel')?.addEventListener('click', () =>
    document.getElementById('asset-modal').classList.add('hidden'));
  document.getElementById('asset-save')?.addEventListener('click', () => {
    const raw = document.getElementById('asset-input').value;
    const amt = parseInt(raw.replace(/,/g,''));
    if(!amt||amt<0){alert('올바른 금액을 입력해주세요.');return;}
    assetSnaps[mkKey(curYear,curMonth)] = {amount:amt, date:todayStr()};
    saveAss();
    document.getElementById('asset-modal').classList.add('hidden');
    render();
  });
  document.getElementById('asset-input')?.addEventListener('input', e=>{e.target.value=fmtNum(e.target.value);});
  document.getElementById('asset-modal')?.addEventListener('click', e=>{
    if(e.target===document.getElementById('asset-modal'))
      document.getElementById('asset-modal').classList.add('hidden');
  });
}

// ══ DASHBOARD ════════════════════════════════════════════════
function renderDashboard(monthTx,inc,exp,sav,inv,bal,netAsset,mb) {
  const expTx = monthTx.filter(t=>t.type==='expense');
  const over  = EXP_CATS.filter(c=>{
    const b=mb[c.id]; if(!b) return false;
    return expTx.filter(t=>t.category===c.id).reduce((s,t)=>s+t.amount,0)>b;
  });
  const catMap={};
  expTx.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const top3=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return `
  ${assetBannerHTML(netAsset)}
  ${summaryHTML(inc,exp,sav,inv,bal)}
  ${over.length?`<div class="alert-over"><div class="ah">⚠️ 예산 초과</div>${over.map(c=>`<div class="am">${c.label} 예산을 초과했어요!</div>`).join('')}</div>`:''}
  ${top3.length?`<div class="card"><div class="card-title">🔥 이번 달 지출 TOP3</div>${top3.map(([id,amt])=>{const cat=EXP_CATS.find(c=>c.id===id);const pct=exp>0?Math.round(amt/exp*100):0;return`<div class="cstat"><div class="cdot" style="background:${cat?.color||'#888'}"></div><div class="cname">${cat?.label||id}</div><div class="cbar"><div class="cbar-fill" style="width:${pct}%;background:${cat?.color||'#888'}"></div></div><div class="cpct">${pct}%</div><div class="camt">${fmtShort(amt)}</div></div>`;}).join('')}</div>`:''}
  ${sav>0?`<div class="card">
    <div class="card-title">🏦 이번 달 저축 <span style="color:#818cf8;font-weight:700">${fmt(sav)}</span></div>
    ${monthTx.filter(t=>t.type==='saving').map(t=>{const cat=SAV_CATS.find(c=>c.id===t.category)||{label:t.category,color:'#818cf8'};return`<div class="cstat"><div class="cdot" style="background:${cat.color}"></div><div class="cname">${t.memo||cat.label}</div><div style="font-size:.76rem;font-family:var(--mono);font-weight:700;color:#818cf8">${fmt(t.amount)}</div></div>`;}).join('')}
  </div>`:''}
  ${inv>0?`<div class="card">
    <div class="card-title">📈 이번 달 투자 <span style="color:var(--blue);font-weight:700">${fmt(inv)}</span></div>
    ${monthTx.filter(t=>t.type==='invest').map(t=>{const cat=INV_CATS.find(c=>c.id===t.category)||{label:t.category,color:'#06b6d4'};return`<div class="cstat"><div class="cdot" style="background:${cat.color}"></div><div class="cname">${t.memo||cat.label}</div><div style="font-size:.76rem;font-family:var(--mono);font-weight:700;color:var(--blue)">${fmt(t.amount)}</div></div>`;}).join('')}
  </div>`:''}
  <div class="card">
    <div class="card-title">🕐 최근 거래</div>
    ${monthTx.slice(0,5).length?monthTx.slice(0,5).map(t=>txRowHTML(t)).join(''):'<div class="empty"><div class="ei">📭</div><p>이번 달 거래가 없어요<br/>➕ 입력 탭에서 추가하거나<br/>🔁 자동화 탭에서 정기 항목을 등록해요</p></div>'}
  </div>`;
}

}

    <div class="fg"><label class="flabel">항목 이름</label><input type="text" class="finput" id="rec-name" placeholder="예: 월급, 청약적금, 월세, 넷플릭스"/></div>
    <div class="frow">
      <div class="fg"><label class="flabel">금액 (원)</label><input type="text" inputmode="numeric" class="finput" id="rec-amount" placeholder="0"/></div>
      <div class="fg"><label class="flabel">매월 적용일</label><select class="fselect" id="rec-day">${dayOpts}</select></div>
    </div>
    <div class="fg"><label class="flabel">카테고리</label>
      <select class="fselect" id="rec-cat">${EXP_CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select>
    </div>
    <button class="submit-btn" id="rec-submit">🔁 정기 항목 등록</button>
  </div>`;
}
function setRecType(t) {
  document.getElementById('rec-type').value=t;
  document.getElementById('rec-btn-inc').className=`type-btn inc${t==='income'?' on':''}`;
  document.getElementById('rec-btn-exp').className=`type-btn exp${t==='expense'?' on':''}`;
  document.getElementById('rec-btn-sav').className=`type-btn sav${t==='saving'?' on':''}`;
  document.getElementById('rec-btn-inv').className=`type-btn inv${t==='invest'?' on':''}`;
  const cats=t==='income'?INC_CATS:t==='saving'?SAV_CATS:t==='invest'?INV_CATS:EXP_CATS;
  document.getElementById('rec-cat').innerHTML=cats.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
}
function bindRecurring() {
  document.getElementById('rec-amount')?.addEventListener('input',e=>{e.target.value=fmtNum(e.target.value);});
  document.getElementById('rec-submit')?.addEventListener('click',()=>{
    const type  =document.getElementById('rec-type').value;
    const name  =document.getElementById('rec-name').value.trim();
    const amtRaw=document.getElementById('rec-amount').value;
    const dayVal=document.getElementById('rec-day').value;
    const cat   =document.getElementById('rec-cat').value;
    const amount=parseInt(amtRaw.replace(/,/g,''));
    if(!name){alert('항목 이름을 입력해주세요.');return;}
    if(!amount||amount<=0){alert('금액을 올바르게 입력해주세요.');return;}
    const day=dayVal==='last'?'last':parseInt(dayVal);
    recurrings.push({id:Date.now().toString(),name,type,amount,category:cat,day,enabled:true});
    saveRec();
    const rt=document.getElementById('rec-toast');
    if(rt){rt.innerHTML='<div class="toast">✅ 정기 항목이 등록됐어요!</div>';setTimeout(()=>{if(rt)rt.innerHTML='';},1800);}
    document.getElementById('rec-name').value='';
    document.getElementById('rec-amount').value='';
    render();
  });
  document.querySelectorAll('.rec-enabled').forEach(cb=>{
    cb.addEventListener('change',()=>{const r=recurrings.find(x=>x.id===cb.dataset.id);if(r){r.enabled=cb.checked;saveRec();}});
  });
  document.querySelectorAll('.rec-del').forEach(b=>{
    b.addEventListener('click',()=>{if(!confirm('이 정기 항목을 삭제할까요?'))return;recurrings=recurrings.filter(r=>r.id!==b.dataset.id);saveRec();render();});
  });
  document.getElementById('apply-now-btn')?.addEventListener('click',()=>{
    const mk=mkKey(curYear,curMonth);
    delete appliedMonths[mk];
    const cnt=autoApplyRecurring(curYear,curMonth);
    alert(`${cnt > 0 ? cnt+'건의 정기 항목이' : '적용할 활성화 항목이 없거나 이미 모두'} ${curYear}년 ${curMonth+1}월에 적용됐어요!`);
    render();
  });
}

// ══ CHART ════════════════════════════════════════════════════
function renderChart() {
  return `
  <div class="card"><div class="card-title">🥧 이번 달 소비 지출</div><div class="chart-wrap"><canvas id="pie-chart"></canvas></div></div>

function buildCharts() {
  const monthTx=getMonthTx();
  const expTx=monthTx.filter(t=>t.type==='expense');
  const catMap={};expTx.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const catKeys=Object.keys(catMap).filter(k=>catMap[k]>0);
  const cats=catKeys.map(k=>EXP_CATS.find(c=>c.id===k)||{id:k,label:k,color:'#888'});

  const pieEl=document.getElementById('pie-chart');
  if(pieEl&&catKeys.length){
    new Chart(pieEl,{type:'doughnut',data:{labels:cats.map(c=>c.label),datasets:[{data:catKeys.map(k=>catMap[k]),backgroundColor:cats.map(c=>c.color),borderWidth:2,borderColor:'#16162a'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:10,color:'#9898c0'}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)}`}}},cutout:'60%'}});
  } else if(pieEl){
    pieEl.closest('.card').querySelector('.chart-wrap').innerHTML='<div class="empty"><div class="ei">📊</div><p>지출 내역을 추가하면 차트가 표시돼요</p></div>';
  }

  // 저축 파이차트
  const savTxChart=monthTx.filter(t=>t.type==='saving');
  const savMap={};savTxChart.forEach(t=>{savMap[t.category]=(savMap[t.category]||0)+t.amount;});
  const savKeys=Object.keys(savMap).filter(k=>savMap[k]>0);
  const savCatsChart=savKeys.map(k=>SAV_CATS.find(c=>c.id===k)||{id:k,label:k,color:'#818cf8'});
  const savEl=document.getElementById('sav-chart');
  if(savEl&&savKeys.length){
    new Chart(savEl,{type:'doughnut',data:{labels:savCatsChart.map(c=>c.label),datasets:[{data:savKeys.map(k=>savMap[k]),backgroundColor:savCatsChart.map(c=>c.color),borderWidth:2,borderColor:'#16162a'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:10,color:'#9898c0'}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)}`}}},cutout:'60%'}});
  } else if(savEl){
    savEl.closest('.card').querySelector('.chart-wrap').innerHTML='<div class="empty"><div class="ei">🏦</div><p>저축 내역이 없어요</p></div>';
  }

  // 투자 파이차트
  const invTxChart=monthTx.filter(t=>t.type==='invest');
  const invMap={};invTxChart.forEach(t=>{invMap[t.category]=(invMap[t.category]||0)+t.amount;});
  const invKeys=Object.keys(invMap).filter(k=>invMap[k]>0);
  const invCatsChart=invKeys.map(k=>INV_CATS.find(c=>c.id===k)||{id:k,label:k,color:'#06b6d4'});
  const invEl=document.getElementById('inv-chart');
  if(invEl&&invKeys.length){
    new Chart(invEl,{type:'doughnut',data:{labels:invCatsChart.map(c=>c.label),datasets:[{data:invKeys.map(k=>invMap[k]),backgroundColor:invCatsChart.map(c=>c.color),borderWidth:2,borderColor:'#16162a'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:10,color:'#9898c0'}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)}`}}},cutout:'60%'}});
  } else if(invEl){
    invEl.closest('.card').querySelector('.chart-wrap').innerHTML='<div class="empty"><div class="ei">📈</div><p>투자 내역이 없어요</p></div>';
  }

  const m6=[];
  for(let i=5;i>=0;i--){let m=curMonth-i,y=curYear;if(m<0){m+=12;y--;}m6.push({key:mkKey(y,m),label:`${String(m+1).padStart(2,'0')}월`});}
  const b6=m6.map(({key,label})=>{const tx=transactions.filter(t=>t.date.startsWith(key));return{label,inc:tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),exp:tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),sav:tx.filter(t=>t.type==='saving').reduce((s,t)=>s+t.amount,0),inv:tx.filter(t=>t.type==='invest').reduce((s,t)=>s+t.amount,0)};});
  const barEl=document.getElementById('bar-chart');
  if(barEl) new Chart(barEl,{type:'bar',data:{labels:b6.map(b=>b.label),datasets:[{label:'수입',data:b6.map(b=>b.inc),backgroundColor:'#34d39944',borderColor:'#34d399',borderWidth:1.5,borderRadius:5},{label:'지출',data:b6.map(b=>b.exp),backgroundColor:'#f8717144',borderColor:'#f87171',borderWidth:1.5,borderRadius:5},{label:'저축',data:b6.map(b=>b.sav),backgroundColor:'rgba(129,140,248,.3)',borderColor:'#818cf8',borderWidth:1.5,borderRadius:5},{label:'투자',data:b6.map(b=>b.inv),backgroundColor:'rgba(96,165,250,.3)',borderColor:'#60a5fa',borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},boxWidth:10,color:'#9898c0'}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmtShort(v),color:'#5c5c8a'},grid:{color:'#2e2e50'}},x:{ticks:{color:'#5c5c8a'},grid:{display:false}}}}});

  // 자산 추이 (12개월)
  const m12=[];
  for(let i=11;i>=0;i--){let m=curMonth-i,y=curYear;if(m<0){m+=12;y--;}m12.push({key:mkKey(y,m),label:`${String(m+1).padStart(2,'0')}월`});}
  // 스냅샷이 없는 달은 이전 자산 + 수지로 추정
  let runningAsset = null;
  const assData = m12.map(({key,label}) => {
    const snap=assetSnaps[key];
    if(snap){ runningAsset=snap.amount; return{label,val:snap.amount,real:true}; }
    if(runningAsset!==null){
      const tx=transactions.filter(t=>t.date.startsWith(key));
      const {inc,exp}=totals(tx);
      runningAsset = runningAsset+inc-exp;
      return{label,val:runningAsset,real:false};
    }
    return{label,val:null,real:false};
  });
  const assEl=document.getElementById('asset-chart');
  if(assEl){
    if(assData.some(d=>d.val!==null)){
      new Chart(assEl,{type:'line',data:{labels:assData.map(d=>d.label),datasets:[{label:'총 자산',data:assData.map(d=>d.val),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.08)',borderWidth:2,pointRadius:5,pointBackgroundColor:assData.map(d=>d.real?'#60a5fa':'rgba(96,165,250,0.3)'),fill:true,tension:0.35,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9898c0',font:{size:11}}},tooltip:{callbacks:{label:ctx=>ctx.raw!=null?` ${fmt(ctx.raw)} ${assData[ctx.dataIndex].real?'(확인됨)':'(추정)'}`:'데이터 없음'}}},scales:{y:{ticks:{callback:v=>fmtShort(v),color:'#5c5c8a'},grid:{color:'#2e2e50'}},x:{ticks:{color:'#5c5c8a'},grid:{display:false}}}}});
    } else {
      assEl.closest('.card').querySelector('.chart-wrap').innerHTML='<div class="empty"><div class="ei">📦</div><p>자산을 기록하면 추이 차트가 표시돼요<br/>홈 탭 상단에서 총 자산을 입력해보세요</p></div>';
    }
  }
}

  <div class="card">
    <div class="card-title">📈 투자 내역</div>
    ${invTx.length ? invTx.map(t=>{const cat=INV_CATS.find(c=>c.id===t.category)||{label:t.category,color:'#06b6d4'};return`<div class="cstat"><div class="cdot" style="background:${cat.color}"></div><div class="cname">${t.memo||cat.label}</div><div style="font-size:.74rem;font-family:var(--mono);font-weight:700;color:var(--blue)">${fmt(t.amount)}</div></div>`;}).join('')+'<div class="srow" style="margin-top:6px"><span class="slbl" style="font-weight:700">합계</span><span class="sval2" style="color:var(--blue)">${fmt(inv)}</span></div>' : '<div class="empty" style="padding:16px"><div class="ei">📈</div><p>이번 달 투자 내역이 없어요</p></div>'}
  </div>
  <div class="card">
    <div class="card-title">📅 전월 대비</div>
    <div class="srow"><span class="slbl">수입 변화</span><span class="sval2">${diffHTML(inc-prevInc,prevInc)}</span></div>
    <div class="srow"><span class="slbl">지출 변화</span><span class="sval2">${diffHTML(exp-prevExp,prevExp)}</span></div>
    <div class="srow"><span class="slbl">저축 변화</span><span class="sval2">${diffHTML(sav-prevSav,prevSav)}</span></div>
    <div class="srow"><span class="slbl">투자 변화</span><span class="sval2">${diffHTML(inv-prevInv,prevInv)}</span></div>
  </div>
  <div class="card">
    <div class="card-title">🍽 카테고리별 지출</div>
    ${Object.keys(catMap).length?Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([id,amt])=>{const cat=EXP_CATS.find(c=>c.id===id);const pct=exp>0?Math.round(amt/exp*100):0;return`<div class="cstat"><div class="cdot" style="background:${cat?.color||'#888'}"></div><div class="cname">${cat?.label||id}</div><div class="cbar"><div class="cbar-fill" style="width:${pct}%;background:${cat?.color||'#888'}"></div></div><div class="cpct">${pct}%</div><div class="camt">${fmtShort(amt)}</div></div>`;}).join(''):'<div class="empty"><div class="ei">📊</div><p>지출 내역이 없어요</p></div>'}
  </div>
  ${budgetCats.length?`<div class="card"><div class="card-title">🎯 예산 달성 현황</div><div style="text-align:center;padding:10px 0 14px"><div style="font-size:2rem;font-weight:800;color:var(--accent)">${Math.round(achiev.length/budgetCats.length*100)}%</div><div style="font-size:.76rem;color:var(--text3);margin-top:2px">${budgetCats.length}개 중 ${achiev.length}개 달성</div></div>${budgetCats.map(cat=>{const sp=catMap[cat.id]||0,bg=mb[cat.id];return`<div class="srow"><span class="slbl">${cat.label}</span><span class="sval2" style="color:${sp>bg?'var(--red)':'var(--green)'}">${fmt(sp)} / ${fmt(bg)} (${Math.round(sp/bg*100)}%)</span></div>`;}).join('')}</div>`:''}
  <div class="card">
    <div class="card-title">💾 데이터 내보내기</div>
    <div class="export-row">
      <button class="export-btn" id="exp-csv">📄 CSV</button>
      <button class="export-btn" id="exp-xlsx">📊 Excel</button>
    </div>
    <div class="export-row"><button class="export-btn" id="exp-all-csv" style="flex:1">📦 전체 CSV</button></div>
  </div>`;
}
function bindExport() {
  const mTx=getMonthTx(), allTx=transactions.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const pad=String(curMonth+1).padStart(2,'0');
  document.getElementById('exp-csv')?.addEventListener('click',()=>exportCSV(mTx,`가계부_${curYear}${pad}.csv`));
  document.getElementById('exp-xlsx')?.addEventListener('click',()=>exportXLSX(mTx,`가계부_${curYear}${pad}.xlsx`));
  document.getElementById('exp-all-csv')?.addEventListener('click',()=>exportCSV(allTx,'가계부_전체.csv'));
}
function txToRows(txs){const typeLabel={income:'수입',expense:'지출',saving:'저축',invest:'투자'};return txs.map(t=>{const cat=ALL_CATS.find(c=>c.id===t.category)||{label:t.category};return{날짜:t.date,구분:typeLabel[t.type]||t.type,카테고리:cat.label.replace(/\p{Emoji}\s*/gu,''),금액:t.amount,메모:t.memo||'',자동여부:t.auto?'자동':'수동'};});}
function exportCSV(txs,fn){const r=txToRows(txs),h=['날짜','구분','카테고리','금액','메모','자동여부'],csv=['\uFEFF'+h.join(','),...r.map(row=>h.map(k=>`"${(row[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');dl(new Blob([csv],{type:'text/csv;charset=utf-8'}),fn);}
function exportXLSX(txs,fn){const ws=XLSX.utils.json_to_sheet(txToRows(txs));ws['!cols']=[{wch:12},{wch:6},{wch:12},{wch:12},{wch:20},{wch:8}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'가계부');XLSX.writeFile(wb,fn);}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}

// ══ NAV ══════════════════════════════════════════════════════
document.getElementById('prev-btn').addEventListener('click',()=>{
  if(curMonth===0){curYear--;curMonth=11;}else curMonth--;
  autoApplyRecurring(curYear,curMonth); render();
});
document.getElementById('next-btn').addEventListener('click',()=>{
  if(curMonth===11){curYear++;curMonth=0;}else curMonth++;
  autoApplyRecurring(curYear,curMonth); render();
});
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{curTab=b.dataset.tab;render();}));

// ══ PWA ══════════════════════════════════════════════════════
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!localStorage.getItem('pwa-dismissed'))document.getElementById('install-banner').classList.add('show');});
document.getElementById('ib-install-btn').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});}});
document.getElementById('ib-dismiss-btn').addEventListener('click',()=>{document.getElementById('install-banner').classList.remove('show');localStorage.setItem('pwa-dismissed','1');});
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ══ INIT ═════════════════════════════════════════════════════
autoApplyRecurring(_now.getFullYear(), _now.getMonth());
render();
</script>
</body>
</html>
